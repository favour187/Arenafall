<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="darkNavy" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A1628"/><stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="orangeAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B35"/><stop offset="100%" stop-color="#FF8855"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="#050B14" rx="8"/>
  <!-- SR-25 Longshot Sniper Rifle -->
  <g transform="translate(50, 60)">
    <!-- Barrel -->
    <rect x="280" y="28" width="300" height="8" fill="#8899AA" rx="2"/>
    <rect x="280" y="26" width="300" height="4" fill="#AABBCC" rx="1"/>
    <!-- Barrel fluting -->
    <line x1="320" y1="26" x2="320" y2="36" stroke="#667788" stroke-width="1"/>
    <line x1="350" y1="26" x2="350" y2="36" stroke="#667788" stroke-width="1"/>
    <line x1="380" y1="26" x2="380" y2="36" stroke="#667788" stroke-width="1"/>
    <line x1="410" y1="26" x2="410" y2="36" stroke="#667788" stroke-width="1"/>
    <line x1="440" y1="26" x2="440" y2="36" stroke="#667788" stroke-width="1"/>
    <!-- Muzzle brake -->
    <rect x="575" y="22" width="25" height="18" fill="#445566" rx="3"/>
    <rect x="585" y="28" width="4" height="6" fill="#FF6B35"/>
    <rect x="593" y="28" width="4" height="6" fill="#FF6B35"/>
    <!-- Body/Receiver -->
    <path d="M180,20 L280,20 L280,42 L180,42 Z" fill="url(#darkNavy)" stroke="#1E3A5F" stroke-width="1"/>
    <!-- Magazine -->
    <path d="M220,42 L220,85 L240,85 L240,70 L250,70 L250,42 Z" fill="#445566" stroke="#667788" stroke-width="1"/>
    <rect x="225" y="60" width="10" height="15" fill="#FF6B35" rx="2" opacity="0.3"/>
    <!-- Bolt handle -->
    <rect x="210" y="14" width="8" height="18" fill="#8899AA" rx="3"/>
    <circle cx="214" cy="14" r="5" fill="#AABBCC"/>
    <!-- Scope -->
    <rect x="190" y="-5" width="140" height="22" fill="#1E3A5F" rx="4" stroke="#00D4FF" stroke-width="1"/>
    <rect x="210" y="-3" width="100" height="18" fill="#0A1628" rx="3"/>
    <ellipse cx="260" cy="6" rx="8" ry="6" fill="#00D4FF" opacity="0.3"/>
    <line x1="255" y1="6" x2="265" y2="6" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="260" y1="1" x2="260" y2="11" stroke="#00D4FF" stroke-width="0.5"/>
    <!-- Scope mounts -->
    <rect x="210" y="17" width="6" height="5" fill="#667788"/>
    <rect x="290" y="17" width="6" height="5" fill="#667788"/>
    <!-- Stock -->
    <path d="M0,18 L180,18 L180,42 L0,42 Z" fill="url(#darkNavy)" stroke="#1E3A5F" stroke-width="1"/>
    <!-- Buttpad -->
    <rect x="-5" y="18" width="10" height="24" fill="#445566" rx="3"/>
    <!-- Cheek rest -->
    <rect x="40" y="10" width="100" height="14" fill="#2A3440" rx="4"/>
    <!-- Trigger guard -->
    <path d="M170,42 L170,55 Q175,58 185,55 L185,42" fill="none" stroke="#667788" stroke-width="2"/>
    <rect x="175" y="42" width="3" height="8" fill="#8899AA"/>
    <!-- Grip -->
    <path d="M155,42 L148,75 L165,75 L170,42 Z" fill="#1E3A5F" stroke="#2A3440" stroke-width="1"/>
    <!-- Bipod -->
    <rect x="300" y="38" width="4" height="30" fill="#667788"/>
    <rect x="280" y="68" width="20" height="4" fill="#8899AA" rx="1"/>
    <rect x="285" y="72" width="10" height="40" fill="#667788"/>
    <rect x="305" y="72" width="10" height="40" fill="#667788"/>
    <rect x="282" y="110" width="16" height="4" fill="#AABBCC" rx="2"/>
    <rect x="302" y="110" width="16" height="4" fill="#AABBCC" rx="2"/>
    <!-- Orange accent stripe -->
    <rect x="180" y="38" width="100" height="2" fill="#FF6B35"/>
  </g>
  <!-- Label -->
  <text x="400" y="170" font-family="monospace" font-size="16" fill="#00D4FF" text-anchor="middle" letter-spacing="3">SR-25 LONGSHOT // 7.62mm SNIPER RIFLE</text>
  <text x="400" y="188" font-family="monospace" font-size="11" fill="#607080" text-anchor="middle">BOLT-ACTION • 800m EFFECTIVE RANGE • 5-ROUND MAG</text>
</svg>