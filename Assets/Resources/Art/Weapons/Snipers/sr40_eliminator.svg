<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A1628"/><stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="#050B14" rx="8"/>
  <!-- SR-40 Eliminator Anti-Material Rifle -->
  <g transform="translate(40, 65)">
    <!-- Extra long barrel -->
    <rect x="320" y="22" width="350" height="10" fill="#8899AA" rx="2"/>
    <rect x="320" y="20" width="350" height="4" fill="#AABBCC" rx="1"/>
    <!-- Heavy muzzle brake -->
    <rect x="660" y="16" width="40" height="22" fill="#445566" rx="4"/>
    <rect x="668" y="18" width="6" height="18" fill="#FF6B35" rx="1"/>
    <rect x="678" y="18" width="6" height="18" fill="#FF6B35" rx="1"/>
    <rect x="688" y="18" width="6" height="18" fill="#FF6B35" rx="1"/>
    <!-- Receiver -->
    <path d="M180,16 L320,16 L320,36 L180,36 Z" fill="url(#bg)" stroke="#1E3A5F" stroke-width="1"/>
    <!-- Heavy stock -->
    <path d="M0,12 L180,12 L180,36 L0,36 Z" fill="url(#bg)" stroke="#1E3A5F" stroke-width="1"/>
    <!-- Buttpad -->
    <rect x="-8" y="12" width="14" height="24" fill="#2A3440" rx="4"/>
    <rect x="-8" y="14" width="14" height="4" fill="#445566" rx="1"/>
    <rect x="-8" y="22" width="14" height="4" fill="#445566" rx="1"/>
    <rect x="-8" y="30" width="14" height="4" fill="#445566" rx="1"/>
    <!-- Cheek rest -->
    <rect x="30" y="5" width="120" height="12" fill="#2A3440" rx="4"/>
    <!-- Scope -->
    <rect x="190" y="-8" width="160" height="24" fill="#1E3A5F" rx="4" stroke="#00D4FF" stroke-width="1"/>
    <rect x="210" y="-6" width="120" height="20" fill="#0A1628" rx="3"/>
    <ellipse cx="270" cy="4" rx="10" ry="8" fill="#00D4FF" opacity="0.2"/>
    <line x1="264" y1="4" x2="276" y2="4" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="270" y1="-2" x2="270" y2="10" stroke="#00D4FF" stroke-width="0.5"/>
    <!-- Range markers on scope -->
    <text x="220" y="-2" font-family="monospace" font-size="6" fill="#607080">4x-12x</text>
    <!-- Scope mounts -->
    <rect x="195" y="14" width="8" height="4" fill="#667788"/>
    <rect x="330" y="14" width="8" height="4" fill="#667788"/>
    <!-- Magazine -->
    <path d="M250,36 L250,70 L278,70 L278,60 L285,60 L285,36 Z" fill="#445566" stroke="#667788" stroke-width="1"/>
    <rect x="256" y="42" width="18" height="20" fill="#1E3A5F" rx="2"/>
    <!-- Trigger -->
    <path d="M200,36 L200,50 Q205,54 215,50 L215,36" fill="none" stroke="#667788" stroke-width="2"/>
    <rect x="204" y="36" width="4" height="8" fill="#8899AA"/>
    <!-- Grip -->
    <path d="M180,36 L174,70 L195,70 L200,36 Z" fill="#1E3A5F" stroke="#2A3440" stroke-width="1"/>
    <rect x="178" y="42" width="14" height="24" fill="#2A3440" rx="2" opacity="0.5"/>
    <!-- Bipod -->
    <rect x="350" y="34" width="5" height="30" fill="#667788"/>
    <rect x="330" y="64" width="25" height="5" fill="#8899AA" rx="2"/>
    <rect x="335" y="69" width="12" height="50" fill="#667788"/>
    <rect x="338" y="119" width="6" height="3" fill="#AABBCC"/>
    <rect x="355" y="69" width="12" height="50" fill="#667788"/>
    <rect x="358" y="119" width="6" height="3" fill="#AABBCC"/>
    <!-- Cyan accent line -->
    <rect x="180" y="32" width="140" height="2" fill="#00D4FF"/>
  </g>
  <text x="400" y="170" font-family="monospace" font-size="16" fill="#00D4FF" text-anchor="middle" letter-spacing="3">SR-40 ELIMINATOR // .50 CAL ANTI-MATERIEL</text>
  <text x="400" y="188" font-family="monospace" font-size="11" fill="#607080" text-anchor="middle">BOLT-ACTION • 1000m EFFECTIVE RANGE • 3-ROUND MAG</text>
</svg>