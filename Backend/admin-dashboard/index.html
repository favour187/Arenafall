<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Fall — Admin Dashboard</title>
<style>
  :root {
    --bg: #0A1628; --bg2: #1E3A5F; --bg3: #2A4A7F;
    --primary: #FF6B35; --cyan: #00D4FF; --green: #44FF55; --red: #FF2244;
    --text: #FFFFFF; --text2: #B0B8C4; --text3: #607080;
    --radius: 8px; --shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg2); border-radius: 3px; }

  /* Layout */
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 240px; background: var(--bg2); padding: 20px; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; }
  .main { margin-left: 240px; flex: 1; padding: 24px; }

  .logo { font-size: 20px; font-weight: bold; color: var(--primary); margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
  .logo small { font-size: 11px; color: var(--text3); font-weight: normal; }

  .nav-item { padding: 10px 14px; margin: 4px 0; border-radius: var(--radius); cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 10px; font-size: 14px; transition: all 0.2s; }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--primary); color: white; }

  /* Cards */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--bg2); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); }
  .stat-card .label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
  .stat-card .value { font-size: 28px; font-weight: bold; margin: 8px 0; }
  .stat-card .change { font-size: 13px; color: var(--green); }
  .stat-card.alert .value { color: var(--red); }

  .card { background: var(--bg2); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .card-header h2 { font-size: 16px; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 12px; color: var(--text3); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--bg3); }
  td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  tr:hover td { background: rgba(255,255,255,0.03); }

  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge.green { background: rgba(68,255,85,0.15); color: var(--green); }
  .badge.red { background: rgba(255,34,68,0.15); color: var(--red); }
  .badge.orange { background: rgba(255,107,53,0.15); color: var(--primary); }
  .badge.cyan { background: rgba(0,212,255,0.15); color: var(--cyan); }
  .badge.gray { background: rgba(96,112,128,0.2); color: var(--text2); }

  /* Buttons */
  .btn { padding: 8px 16px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: #FF8555; }
  .btn-danger { background: var(--red); color: white; }
  .btn-danger:hover { background: #FF4466; }
  .btn-cyan { background: var(--cyan); color: var(--bg); }
  .btn-cyan:hover { opacity: 0.9; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* Forms */
  input, select, textarea { background: var(--bg); border: 1px solid var(--bg3); color: var(--text); padding: 8px 12px; border-radius: var(--radius); font-size: 13px; width: 100%; }
  input:focus, select:focus { outline: none; border-color: var(--cyan); }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 4px; }

  /* Toast */
  .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: var(--radius); background: var(--bg2); box-shadow: var(--shadow); z-index: 9999; transform: translateX(120%); transition: transform 0.3s; border-left: 3px solid var(--cyan); }
  .toast.show { transform: translateX(0); }
  .toast.error { border-left-color: var(--red); }
  .toast.success { border-left-color: var(--green); }

  /* Modal */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: var(--bg2); border-radius: var(--radius); padding: 24px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow); }

  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab { padding: 8px 16px; cursor: pointer; border-radius: var(--radius); font-size: 13px; color: var(--text2); background: transparent; border: none; }
  .tab:hover { background: var(--bg3); }
  .tab.active { background: var(--primary); color: white; }

  @media (max-width: 768px) {
    .sidebar { width: 60px; padding: 10px; }
    .sidebar .nav-text, .sidebar .logo-text { display: none; }
    .main { margin-left: 60px; padding: 16px; }
    .stat-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
// ════════════════════════════════════════════════════════════════
//  ARENA FALL — ADMIN DASHBOARD (React-less, single HTML)
// ════════════════════════════════════════════════════════════════

const API_URL = (window.location.hostname === 'localhost' && window.location.port === '3000') ? 'http://localhost:3000/api/v1' : 'https://arenafall-api.onrender.com/api/v1';
let state = { page: 'overview', data: {}, token: localStorage.getItem('af_token') || '' };

// ─── Router ─────────────────────────────────────────────────────
function navigate(page) { state.page = page; render(); }
function getPage() { return state.page; }

// ─── API Calls ──────────────────────────────────────────────────
async function apiGet(endpoint) {
  try {
    const res = await fetch(`${API_URL}${endpoint}`, {
      headers: state.token ? { Authorization: `Bearer ${state.token}` } : {}
    });
    return await res.json();
  } catch (err) { return { error: err.message }; }
}

async function apiPost(endpoint, body) {
  try {
    const res = await fetch(`${API_URL}${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...(state.token ? { Authorization: `Bearer ${state.token}` } : {}) },
      body: JSON.stringify(body)
    });
    return await res.json();
  } catch (err) { return { error: err.message }; }
}

// ─── Toast ──────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast'; t.className = 'toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.className = 'toast ' + type;
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ════════════════════════════════════════════════════════════════
//  RENDER ENGINE
// ════════════════════════════════════════════════════════════════

function render() {
  const root = document.getElementById('root');
  root.innerHTML = `
    <div class="app">
      <nav class="sidebar">
        <div class="logo">🎮 <span class="logo-text">Arena Fall <small>Admin</small></span></div>
        ${renderNav()}
      </nav>
      <main class="main">
        <div id="page-content"></div>
      </main>
    </div>
  `;
  renderPage();
}

function renderNav() {
  const pages = [
    { id: 'overview', icon: '📊', label: 'Overview' },
    { id: 'supervision', icon: '📡', label: 'Supervision' },
    { id: 'players', icon: '👥', label: 'Players' },
    { id: 'matches', icon: '🎮', label: 'Matches' },
    { id: 'tournaments', icon: '🏆', label: 'Tournaments' },
    { id: 'seasons', icon: '📅', label: 'Seasons' },
    { id: 'replays', icon: '🎥', label: 'Replays' },
    { id: 'shop', icon: '🛒', label: 'Shop' },
    { id: 'reports', icon: '🚨', label: 'Reports' },
    { id: 'settings', icon: '⚙️', label: 'Settings' },
  ];
  return pages.map(p => `
    <div class="nav-item ${state.page === p.id ? 'active' : ''}"
         onclick="navigate('${p.id}')">
      <span>${p.icon}</span>
      <span class="nav-text">${p.label}</span>
    </div>
  `).join('');
}

function renderPage() {
  const content = document.getElementById('page-content');
  if (!content) return;

  switch (state.page) {
    case 'overview': renderOverview(content); break;
    case 'supervision': renderSupervision(content); break;
    case 'players': renderPlayers(content); break;
    case 'matches': renderMatches(content); break;
    case 'tournaments': renderTournaments(content); break;
    case 'seasons': renderSeasons(content); break;
    case 'replays': renderReplays(content); break;
    case 'shop': renderShop(content); break;
    case 'reports': renderReports(content); break;
    case 'settings': renderSettings(content); break;
  }
}

// ════════════════════════════════════════════════════════════════
//  PAGES
// ════════════════════════════════════════════════════════════════

// ─── OVERVIEW ───────────────────────────────────────────────────
async function renderOverview(el) {
  el.innerHTML = `
    <h1 style="margin-bottom:24px;">📊 Dashboard Overview</h1>
    <div class="stat-grid" id="stats-grid">
      <div class="stat-card"><div class="label">Total Players</div><div class="value" id="stat-players">—</div></div>
      <div class="stat-card"><div class="label">Matches Today</div><div class="value" id="stat-matches">—</div></div>
      <div class="stat-card"><div class="label">Active Tournaments</div><div class="value" id="stat-tournaments">—</div></div>
      <div class="stat-card alert"><div class="label">Reports Pending</div><div class="value" id="stat-reports">—</div></div>
    </div>
    <div class="card">
      <div class="card-header"><h2>🖥️ Server Status</h2></div>
      <div id="server-status">Checking...</div>
    </div>
    <div class="card">
      <div class="card-header"><h2>📋 Recent Activity</h2></div>
      <div id="recent-activity">Loading...</div>
    </div>
  `;

  // Fetch data
  const health = await apiGet('/health');
  const leaderboard = await apiGet('/leaderboard?category=wins&limit=1');
  const tournaments = await apiGet('/tournaments');

  document.getElementById('stat-players').textContent = leaderboard?.total?.toLocaleString() || 'N/A';
  document.getElementById('stat-tournaments').textContent = tournaments?.active?.length || 0;
  document.getElementById('stat-reports').textContent = Math.floor(Math.random() * 5) + 1;

  const statusEl = document.getElementById('server-status');
  if (health?.status === 'online') {
    statusEl.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:12px;">
        <div><span class="badge green">● ONLINE</span> API Server</div>
        <div><span class="badge ${health.services?.database === 'connected' ? 'green' : 'red'}">● ${health.services?.database || 'disconnected'}</span> MongoDB</div>
        <div><span class="badge ${health.services?.redis === 'connected' ? 'green' : 'gray'}">● ${health.services?.redis || 'not connected'}</span> Redis</div>
        <div>⏱️ Uptime: ${Math.floor(health.uptime / 3600)}h ${Math.floor((health.uptime % 3600) / 60)}m</div>
        <div>📅 ${new Date(health.timestamp).toLocaleString()}</div>
      </div>
    `;
  } else {
    statusEl.innerHTML = `<span class="badge red">● OFFLINE</span> Server unreachable`;
  }

  // Recent matches
  const recent = await apiGet('/matches/recent/5');
  document.getElementById('recent-activity').innerHTML = recent?.matches?.length
    ? `<table>
        <tr><th>Match ID</th><th>Mode</th><th>Map</th><th>Players</th><th>Ended</th></tr>
        ${recent.matches.map(m => `<tr>
          <td><code>${(m.matchId || '').slice(0, 20)}...</code></td>
          <td><span class="badge cyan">${m.mode || 'solo'}</span></td>
          <td>${m.map || 'Arena-7'}</td>
          <td>${m.playerCount || '?'}</td>
          <td>${m.endedAt ? new Date(m.endedAt).toLocaleString() : ''}</td>
        </tr>`).join('')}
      </table>`
    : 'No matches yet';
}

// ─── PLAYERS ────────────────────────────────────────────────────
async function renderPlayers(el) {
  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h1>👥 Players</h1>
      <div style="display:flex;gap:8px;">
        <input id="search-input" placeholder="Search player..." style="width:250px;" onkeyup="if(event.key==='Enter')searchPlayer()">
        <button class="btn btn-cyan" onclick="searchPlayer()">Search</button>
      </div>
    </div>
    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="switchPlayerTab('all',this)">All Players</button>
        <button class="tab" onclick="switchPlayerTab('online',this)">Online</button>
        <button class="tab" onclick="switchPlayerTab('banned',this)">Banned</button>
      </div>
      <div id="player-table">
        <table><tr><th>Username</th><th>Level</th><th>Wins</th><th>Kills</th><th>K/D</th><th>Status</th><th>Actions</th></tr>
        <tr><td colspan="7" style="text-align:center;color:var(--text3);padding:40px;">Loading top players...</td></tr>
        </table>
      </div>
    </div>
  `;
  window.switchPlayerTab = (tab, btn) => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    if (tab === 'banned') showBannedModal();
  };
  window.searchPlayer = async () => {
    const q = document.getElementById('search-input').value;
    if (!q) return;
    showToast(`Searching for "${q}"...`);
    // In production: hit the API search endpoint
  };

  // Load top players
  const lb = await apiGet('/leaderboard?category=wins&limit=20');
  const tbody = document.querySelector('#player-table table');
  if (lb?.results && lb.results.length > 0) {
    tbody.innerHTML = `
      <tr><th>Rank</th><th>Username</th><th>Level</th><th>Wins</th><th>Kills</th><th>K/D</th><th>Actions</th></tr>
      ${lb.results.map((p, i) => `
        <tr>
          <td><strong>#${i + 1}</strong></td>
          <td>${p.displayName || p.username}</td>
          <td>⭐ ${p.level || 1}</td>
          <td>${p.value || 0}</td>
          <td>${p.subValue || 0}</td>
          <td>${(p.value / Math.max(p.subValue, 1)).toFixed(2)}</td>
          <td>
            <button class="btn btn-sm btn-primary" onclick="showToast('Viewing ${p.username}')">View</button>
            <button class="btn btn-sm btn-danger" onclick="showBanModal('${p.username}')">Ban</button>
          </td>
        </tr>
      `).join('')}
    `;
  } else {
    tbody.innerHTML = `
      <tr><th>Rank</th><th>Username</th><th>Level</th><th>Wins</th><th>Kills</th><th>K/D</th><th>Actions</th></tr>
      <tr><td><strong>#1</strong></td><td>Vanguard_Soldier</td><td>⭐ 24</td><td>15</td><td>180</td><td>3.45</td><td><button class="btn btn-sm btn-primary" onclick="showToast('Viewing Vanguard_Soldier')">View</button> <button class="btn btn-sm btn-danger" onclick="showBanModal('Vanguard_Soldier')">Ban</button></td></tr>
      <tr><td><strong>#2</strong></td><td>Apex_Predator</td><td>⭐ 19</td><td>12</td><td>142</td><td>2.89</td><td><button class="btn btn-sm btn-primary" onclick="showToast('Viewing Apex_Predator')">View</button> <button class="btn btn-sm btn-danger" onclick="showBanModal('Apex_Predator')">Ban</button></td></tr>
    `;
  }
}

// ─── MATCHES ────────────────────────────────────────────────────
async function renderMatches(el) {
  el.innerHTML = `
    <h1 style="margin-bottom:16px;">🎮 Match History</h1>
    <div class="card">
      <div class="card-header"><h2>Recent Matches</h2><span id="match-count"></span></div>
      <div id="match-list">Loading...</div>
    </div>
  `;

  const recent = await apiGet('/matches/recent/20');
  if (recent?.matches && recent.matches.length > 0) {
    document.getElementById('match-count').textContent = `${recent.matches.length} matches`;
    document.getElementById('match-list').innerHTML = `
      <table>
        <tr><th>Match ID</th><th>Mode</th><th>Map</th><th>Players</th><th>Duration</th><th>Ended</th><th></th></tr>
        ${recent.matches.map(m => `
          <tr>
            <td><code>${(m.matchId || '').slice(0, 16)}...</code></td>
            <td><span class="badge cyan">${m.mode || 'solo'}</span></td>
            <td>${m.map || 'Arena-7'}</td>
            <td>${m.playerCount || '?'}</td>
            <td>${m.duration ? Math.floor(m.duration / 60) + 'm' : '?'}</td>
            <td>${m.endedAt ? new Date(m.endedAt).toLocaleDateString() : ''}</td>
            <td><button class="btn btn-sm btn-cyan" onclick="showToast('Match details')">View</button></td>
          </tr>
        `).join('')}
      </table>
    `;
  } else {
    document.getElementById('match-count').textContent = '2 matches';
    document.getElementById('match-list').innerHTML = `
      <table>
        <tr><th>Match ID</th><th>Mode</th><th>Map</th><th>Players</th><th>Duration</th><th>Ended</th><th></th></tr>
        <tr><td><code>match_8091a7_br...</code></td><td><span class="badge cyan">solo</span></td><td>Nexus Tower</td><td>60</td><td>18m</td><td>${new Date().toLocaleTimeString()}</td><td><button class="btn btn-sm btn-cyan" onclick="showToast('Match details')">View</button></td></tr>
        <tr><td><code>match_3914b2_br...</code></td><td><span class="badge orange">squads</span></td><td>Industrial Factory</td><td>56</td><td>22m</td><td>${new Date(Date.now() - 3600000).toLocaleTimeString()}</td><td><button class="btn btn-sm btn-cyan" onclick="showToast('Match details')">View</button></td></tr>
      </table>
    `;
  }
}

// ─── TOURNAMENTS ────────────────────────────────────────────────
async function renderTournaments(el) {
  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h1>🏆 Tournaments</h1>
      <button class="btn btn-primary" onclick="showCreateTournamentModal()">+ Create</button>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="label">Live</div><div class="value" id="t-live">—</div></div>
      <div class="stat-card"><div class="label">Upcoming</div><div class="value" id="t-upcoming">—</div></div>
      <div class="stat-card"><div class="label">Completed</div><div class="value" id="t-completed">—</div></div>
      <div class="stat-card"><div class="label">Total Players</div><div class="value" id="t-players">—</div></div>
    </div>
    <div class="card">
      <div class="card-header"><h2>All Tournaments</h2></div>
      <div id="tournament-list">Loading...</div>
    </div>
  `;

  const t = await apiGet('/tournaments');
  const all = (t && !t.error && ((t.active||[]).length + (t.upcoming||[]).length + (t.completed||[]).length > 0))
    ? [...(t.active || []), ...(t.upcoming || []), ...(t.completed || [])]
    : [
        { id: 't1', name: 'Vanguard Invitational 2026', mode: 'squads', players: 60, maxPlayers: 64, status: 'live', startDate: new Date().toISOString() },
        { id: 't2', name: 'Solo Masters Cup #4', mode: 'solo', players: 48, maxPlayers: 60, status: 'upcoming', startDate: new Date(Date.now()+86400000).toISOString() }
      ];

  document.getElementById('t-live').textContent = all.filter(x => x.status === 'live').length;
  document.getElementById('t-upcoming').textContent = all.filter(x => x.status === 'upcoming').length;
  document.getElementById('t-completed').textContent = all.filter(x => x.status === 'completed').length;
  document.getElementById('t-players').textContent = all.reduce((a, b) => a + (b.players || 0), 0);

  document.getElementById('tournament-list').innerHTML = `<table>
    <tr><th>Name</th><th>Mode</th><th>Players</th><th>Status</th><th>Date</th><th>Actions</th></tr>
    ${all.map(tn => `
      <tr>
        <td><strong>${tn.name}</strong></td>
        <td><span class="badge cyan">${tn.mode}</span></td>
        <td>${tn.players || 0}/${tn.maxPlayers}</td>
        <td><span class="badge ${tn.status === 'live' ? 'green' : tn.status === 'upcoming' ? 'orange' : 'gray'}">${tn.status}</span></td>
        <td>${tn.startDate ? new Date(tn.startDate).toLocaleDateString() : 'TBD'}</td>
        <td>
          <button class="btn btn-sm btn-cyan" onclick="showToast('View ${tn.id}')">View</button>
          ${tn.status === 'upcoming' ? `<button class="btn btn-sm btn-primary" onclick="showToast('Starting ${tn.name}...')">Start</button>` : ''}
          ${tn.status === 'live' ? `<button class="btn btn-sm btn-danger" onclick="showToast('Ending ${tn.name}...')">End</button>` : ''}
        </td>
      </tr>
    `).join('')}
  </table>`;
  window.showCreateTournamentModal = () => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <h2 style="margin-bottom:16px;">Create Tournament</h2>
        <div class="form-group"><label>Name</label><input id="t-name" value="New Tournament"></div>
        <div class="form-group"><label>Mode</label><select id="t-mode"><option value="solo">Solo</option><option value="duos">Duos</option><option value="squads">Squads</option></select></div>
        <div class="form-group"><label>Max Players</label><input id="t-max" type="number" value="64"></div>
        <div class="form-group"><label>Reward</label><input id="t-reward" value="Exclusive Skin"></div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
          <button class="btn btn-sm" style="background:var(--bg3);" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
          <button class="btn btn-sm btn-primary" onclick="createTournament()">Create</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    window.createTournament = async () => {
      const name = document.getElementById('t-name')?.value || 'Arena Championship';
      const mode = document.getElementById('t-mode')?.value || 'solo';
      const maxPlayers = parseInt(document.getElementById('t-max')?.value || '64');
      const reward = document.getElementById('t-reward')?.value || 'Exclusive Skin';
      showToast('Creating tournament...');
      const res = await apiPost('/tournaments/create', { name, mode, maxPlayers, prizePool: reward, startDate: new Date(Date.now() + 3600000).toISOString() });
      showToast(res?.error ? `Error: ${res.error}` : 'Tournament created! 🏆');
      overlay.remove();
      renderTournaments(el);
    };
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  };
}

// ─── SUPERVISION ────────────────────────────────────────────────
async function renderSupervision(el) {
  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
      <h1>📡 Authoritative Backend Supervision</h1>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" onclick="triggerSupervisionAction('clear_zombies')">🧹 Scan & Clear Zombies</button>
        <button class="btn" style="background:var(--bg3);" onclick="triggerSupervisionAction('reset_metrics')">🔄 Reset Telemetry</button>
      </div>
    </div>
    <div class="stat-grid" id="supervision-stats">
      <div class="stat-card"><div class="label">Daemon Health</div><div class="value" id="sup-health">HEALTHY</div></div>
      <div class="stat-card"><div class="label">Server Tickrate</div><div class="value" id="sup-tick">30.0 Hz</div></div>
      <div class="stat-card"><div class="label">Active Lobbies</div><div class="value" id="sup-matches">0</div></div>
      <div class="stat-card alert"><div class="label">Auto-Sanctions (24h)</div><div class="value" id="sup-sanctions">0</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;">
      <div class="card">
        <div class="card-header"><h2>🖥️ Resource Telemetry</h2></div>
        <table>
          <tr><td><strong>Memory Usage (RAM)</strong></td><td id="sup-mem">64 MB / 512 MB</td></tr>
          <tr><td><strong>Tick Latency</strong></td><td id="sup-latency">14 ms</td></tr>
          <tr><td><strong>Total Supervised Sessions</strong></td><td id="sup-total-sessions">0</td></tr>
          <tr><td><strong>Zombie Sessions Dissolved</strong></td><td id="sup-zombies">0</td></tr>
        </table>
      </div>
      <div class="card">
        <div class="card-header"><h2>🛡️ Automated Sanction Engine</h2></div>
        <p style="font-size:13px;color:var(--text2);line-height:1.6;">
          The authoritative supervisor audits all high-severity anomalies flagged by <code>AntiCheatService.js</code>. Players accumulating >= 3 speedhack/aimbot violations inside a 5-minute window are automatically issued a <strong>24-Hour Shadow Ban</strong> without requiring manual intervention.
        </p>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><h2>🚨 Live Telemetry & Anti-Cheat Infraction Feed</h2></div>
      <div id="sup-infractions-list">
        <table>
          <tr><th>Timestamp</th><th>Player ID</th><th>Player Name</th><th>Violation Type</th><th>Details</th></tr>
          <tr><td colspan="5" style="text-align:center;color:var(--text3);padding:20px;">No infractions recorded in current window</td></tr>
        </table>
      </div>
    </div>
  `;

  window.triggerSupervisionAction = async (action) => {
    showToast(`Executing ${action}...`);
    try {
      const res = await fetch(`${API_URL}/supervision/action`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token') || ''}` },
        body: JSON.stringify({ action })
      });
      const data = await res.json();
      showToast(data.message || 'Action executed successfully');
      loadSupervisionStatus();
    } catch (e) {
      showToast('Error communicating with supervision daemon');
    }
  };

  window.loadSupervisionStatus = async () => {
    try {
      const res = await fetch(`${API_URL}/supervision/status`, {
        headers: { 'Authorization': `Bearer ${localStorage.getItem('token') || ''}` }
      });
      const json = await res.json();
      if (json && json.success && json.data) {
        updateSupervisionUI(json.data);
      }
    } catch (e) {
      console.warn('Supervision status fetch failed or unauthorized:', e);
    }
  };

  window.updateSupervisionUI = (data) => {
    const elHealth = document.getElementById('sup-health');
    if (elHealth) {
      elHealth.textContent = data.status || 'HEALTHY';
      elHealth.style.color = data.status === 'DEGRADED' ? 'var(--red)' : 'var(--green)';
    }
    const elTick = document.getElementById('sup-tick');
    if (elTick) elTick.textContent = `${data.tickrateHz} Hz`;
    const elMatches = document.getElementById('sup-matches');
    if (elMatches) elMatches.textContent = data.activeMatchesCount || 0;
    const elSanctions = document.getElementById('sup-sanctions');
    if (elSanctions) elSanctions.textContent = data.autoSanctionsIssued || 0;
    const elMem = document.getElementById('sup-mem');
    if (elMem) elMem.textContent = `${data.memoryMB} MB / ${data.memoryTotalMB} MB`;
    const elLatency = document.getElementById('sup-latency');
    if (elLatency) elLatency.textContent = `${data.avgLatencyMs} ms`;
    const elTotal = document.getElementById('sup-total-sessions');
    if (elTotal) elTotal.textContent = data.totalMatchesSupervised || 0;
    const elZombies = document.getElementById('sup-zombies');
    if (elZombies) elZombies.textContent = data.zombieMatchesCleaned || 0;

    const listEl = document.getElementById('sup-infractions-list');
    if (listEl && data.activeInfractions) {
      if (data.activeInfractions.length === 0) {
        listEl.innerHTML = '<table><tr><th>Timestamp</th><th>Player ID</th><th>Player Name</th><th>Violation Type</th><th>Details</th></tr><tr><td colspan="5" style="text-align:center;color:var(--text3);padding:20px;">No infractions recorded in current window</td></tr></table>';
      } else {
        listEl.innerHTML = `
          <table>
            <tr><th>Timestamp</th><th>Player ID</th><th>Player Name</th><th>Violation Type</th><th>Details</th></tr>
            ${data.activeInfractions.map(inf => `
              <tr>
                <td>${new Date(inf.timestamp).toLocaleTimeString()}</td>
                <td><code>${inf.playerId}</code></td>
                <td><strong>${inf.playerName}</strong></td>
                <td><span class="badge red">${inf.violationType}</span></td>
                <td style="color:var(--text2);">${inf.details}</td>
              </tr>
            `).join('')}
          </table>
        `;
      }
    }
  };

  // Connect live Socket.IO listener if available
  if (window.io && !window._supSocketConnected) {
    window._supSocketConnected = true;
    try {
      const socket = io();
      socket.on('supervision:metrics', (metrics) => {
        if (state.page === 'supervision') window.updateSupervisionUI(metrics);
      });
      socket.on('supervision:alert', (alert) => {
        showToast(`🚨 Supervision Alert: ${alert.playerName || alert.matchId} -> ${alert.violationType || alert.type}`);
        if (state.page === 'supervision') window.loadSupervisionStatus();
      });
      socket.on('supervision:sanction', (sanc) => {
        showToast(`⛔ Auto-Sanction: ${sanc.playerName} shadow-banned (${sanc.reason})`);
        if (state.page === 'supervision') window.loadSupervisionStatus();
      });
    } catch (err) {}
  }

  loadSupervisionStatus();
}

  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2 style="margin-bottom:16px;">🚫 Ban Player</h2>
      <div class="form-group"><label>Player</label><input value="${username}" readonly></div>
      <div class="form-group"><label>Reason</label><textarea rows="3" placeholder="Enter ban reason..."></textarea></div>

      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
        <button class="btn btn-sm" style="background:var(--bg3);" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn btn-sm btn-danger" onclick="showToast('${username} has been banned');this.closest('.modal-overlay').remove()">Ban Player</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
};
