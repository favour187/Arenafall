version: '3.8'

networks:
  arenafall-net:
    driver: bridge

volumes:
  mongodb-data:
  redis-data:
  arenafall-logs:

services:
  # ─── Game Backend API ──────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arenafall-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/arenafall
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-secure-secret-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change-this-refresh-secret-too}
      - JWT_EXPIRY=24h
      - JWT_REFRESH_EXPIRY=7d
      - RATE_LIMIT_MAX=100
      - ANTICHEAT_ENABLED=true
      - GAME_SERVER_URL=ws://gameserver:3001
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-default-32-char-encryption-key!}
      - ENCRYPTION_IV=${ENCRYPTION_IV:-default-iv-16-ch}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - arenafall-logs:/app/logs
    networks:
      - arenafall-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── MongoDB ───────────────────────────────────────────────
  mongodb:
    image: mongo:7-jammy
    container_name: arenafall-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: arenafall
      # MONGO_INITDB_ROOT_USERNAME: admin
      # MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
    volumes:
      - mongodb-data:/data/db
    networks:
      - arenafall-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: arenafall-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - arenafall-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: arenafall-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - arenafall-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
